name: Mathics3 (Consistency Checks)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        sudo apt update -qq && sudo apt install llvm-dev remake
        python -m pip install --upgrade pip setuptools wheel
        # We can comment out after next Mathics3-Scanner release
        # python -m pip install -e git+https://github.com/Mathics3/Mathics3-scanner#egg=Mathics3-Scanner[full]
        git clone --depth 1 https://github.com/Mathics3/Mathics3-scanner.git
        cd Mathics3-scanner/
        git fetch
        git checkout doctest_workflow
        pip install -e .
        bash -x admin-tools/make-JSON-tables.sh
        cd ..
        python -m pip install setuptools wheel
        pip install --no-build-isolation -e .

    - name: Install Mathics3 with minimum dependencies
      run: |
        make develop
    - name: Test Mathics3 Consistency and Style
      run: |
        make check-consistency-and-style
        make check-builtin-manifest
