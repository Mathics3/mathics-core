name: Mathics3 (ubuntu full with Cython)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    env:
      USE_CYTHON: 1
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install Mathics3 dependencies
      run: |
        sudo apt-get update -qq && sudo apt-get install -qq liblapack-dev llvm-dev tesseract-ocr
        python -m pip install --upgrade pip
        # We can comment out after next Mathics3-Scanner release
        git clone --depth 1 https://github.com/Mathics3/Mathics3-scanner.git
        cd Mathics3-scanner/
        pip install -e .
        bash -x admin-tools/make-JSON-tables.sh
        cd ..

    - name: Install Mathics3 with full dependencies
      run: |
        python -m pip install setuptools wheel
        make develop-full-cython
    - name: Test Mathics
      run: |
        make -j3 check
