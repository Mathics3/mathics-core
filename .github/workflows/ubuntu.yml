name: Mathics3 (ubuntu)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: '**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.13', '3.12', '3.11']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install OS dependencies
      run: |
        sudo apt-get update -qq && sudo apt-get install -qq liblapack-dev llvm-dev tesseract-ocr remake
    - name: Install Mathics3 dependencies
      run: |
        python -m pip install --upgrade pip setuptools wheel
        # We can comment out after next Mathics3-Scanner release
        # python -m pip install -e git+https://github.com/Mathics3/Mathics3-scanner#egg=Mathics3-Scanner[full]
        git clone --depth 1 https://github.com/Mathics3/Mathics3-scanner.git
        git checkout doctest_workflow
        cd Mathics3-scanner/
        pip install -e .
        bash -x admin-tools/make-JSON-tables.sh
        cd ..
    - name: Install Mathics3
      run: |
        python -m pip install setuptools wheel
        python -m pip install --no-build-isolation -e .[dev]
        remake -x develop-full
    - name: Test Mathics
      run: |
        make -j3 check
