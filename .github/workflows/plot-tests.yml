name: Mathics3 Plot Detailed Tests  (ubuntu)

on:
  push:
    branches: [ master ]
  pull_request:
    branches: '**'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.13']
    steps:
    - uses: actions/checkout@v6
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install OS dependencies
      run: |
        sudo apt-get update -qq && sudo apt-get install -qq liblapack-dev llvm-dev tesseract-ocr remake
    - name: Install dependent Mathics3 programs
      run: |
        python -m pip install --upgrade pip
        # We can comment out after next Mathics3-Scanner release
        git clone --depth 1 https://github.com/Mathics3/Mathics3-scanner.git
        cd Mathics3-scanner/
        pip install -e .
        bash -x ./admin-tools/make-JSON-tables.sh
        cd ..
        # We can comment out after next Mathics3-Scanner release
        # python -m pip install Mathics3-Scanner[full]
        # python -m pip install -e git+https://github.com/Mathics3/Mathics3-scanner#egg=Mathics3-Scanner[full]
    - name: Install Mathics3 with full dependencies
      run: |
        pip install -e .
        bash -x ./admin-tools/make-JSON-tables.sh
        remake -x develop-full
    - name: Test Mathics
      run: |
        make plot-detailed-tests
