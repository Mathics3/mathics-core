---
name: Mathics3 (Type checking)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.14']
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          sudo apt update -qq && sudo apt install llvm-dev remake
          python -m pip install --upgrade pip setuptools wheel

      - name: Install mathics-core
        run: |
          pip install mypy==1.13 sympy==1.12
          # Adjust below for right branch
          # git clone --depth 1 https://github.com/Mathics3/Mathics3-scanner.git
          # cd Mathics3-scanner/
          # pip install -e .
          # bash ./admin-tools/make-JSON-tables.sh
          # pip install -e .
          # cd ..
          # touch ./Mathics3-scanner/mathics_scanner/py.typed
          python -m pip install setuptools wheel
          make develop
      - name: Run mypy on mathics-core
        run: |
          mypy --install-types --ignore-missing-imports --non-interactive mathics
